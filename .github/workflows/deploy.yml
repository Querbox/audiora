name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 3 * * *' # nächtlicher Import der aktuellen Podcast-Charts
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Echte Podcast-Daten importieren (Fallback auf eingecheckte Daten)
        run: node scripts/import-podcasts.mjs || echo "Import fehlgeschlagen – nutze committete real-podcasts.json"
      - name: Echte Hörbuch-Charts importieren (Fallback auf eingecheckte Daten)
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: node scripts/import-audiobooks.mjs || echo "Import fehlgeschlagen – nutze committete real-audiobooks.json"
      - name: LibriVox-Klassiker importieren (Fallback auf eingecheckte Daten)
        run: node scripts/import-librivox.mjs || echo "Import fehlgeschlagen – nutze committete real-librivox.json"
      - run: npm run build
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
